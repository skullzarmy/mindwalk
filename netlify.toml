[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Proxy all /api traffic to our Serverless wrapped Express backend
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Standard SPA fallback for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
