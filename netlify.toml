[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["satori", "@resvg/resvg-js", "satori-html"]
  included_files = ["server/fonts/**"]

# Proxy all /api traffic to our Serverless wrapped Express backend
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Standard SPA fallback for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
